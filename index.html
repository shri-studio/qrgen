<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRGen — Free Custom QR Code Generator</title>
<meta name="description" content="Free, open-source QR code generator. No account, no watermarks, no limits.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▦</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222f;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f5;--text2:#9090a8;--text3:#5a5a70;--accent:#7c6af7;--accent2:#a78bfa;--accent-bg:rgba(124,106,247,0.12);--green:#34d399;--green-bg:rgba(52,211,153,0.1);--r:12px;--rs:8px}
[data-theme="light"]{--bg:#f5f5f0;--bg2:#ffffff;--bg3:#eeede8;--bg4:#e5e4df;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#0f0f1a;--text2:#5a5a70;--text3:#9090a8;--accent:#5b47f0;--accent2:#7c6af7;--accent-bg:rgba(91,71,240,0.08);--green:#059669;--green-bg:rgba(5,150,105,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg)}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:17px;height:17px;fill:white}
.logo-txt{font-size:1.15rem;font-weight:800;color:var(--text);letter-spacing:-.02em}
.logo-txt span{color:var(--accent2)}
.hdr-r{display:flex;align-items:center;gap:10px}
.counter{font-family:'DM Mono',monospace;font-size:12px;color:var(--green);background:var(--green-bg);padding:5px 12px;border-radius:20px;border:1px solid rgba(52,211,153,.2)}
.icon-btn{width:34px;height:34px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:.15s}
.icon-btn:hover{background:var(--bg4);color:var(--text)}
.gh-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);text-decoration:none;color:var(--text2);font-size:12px;transition:.15s}
.gh-btn:hover{background:var(--bg4);color:var(--text)}

/* LAYOUT — 30/70 */
.wrap{display:grid;grid-template-columns:65% 35%;height:calc(100vh - 61px)}
@media(max-width:800px){.wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr;height:auto}}

/* LEFT PANEL */
.left{border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 61px)}
.left::-webkit-scrollbar{width:3px}
.left::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sec{padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem}

/* TYPE TABS */
.type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.tb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:.15s;color:var(--text2);font-size:9px;font-weight:700;letter-spacing:.03em}
.tb svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.tb:hover{background:var(--bg4);color:var(--text)}
.tb.on{background:var(--accent-bg);color:var(--accent2);border-color:var(--accent)}

/* INPUTS */
.panel{display:none;margin-top:.75rem}
.panel.show{display:block}
.f{margin-bottom:.75rem}
.f:last-child{margin-bottom:0}
label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px}
input[type=text],input[type=email],input[type=tel],input[type=url],select,textarea{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'Syne',sans-serif;font-size:12px;transition:.15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select{cursor:pointer}
textarea{resize:vertical;min-height:68px;line-height:1.5}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* RANGE */
.rr{display:flex;align-items:center;gap:8px}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--bg4);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.rv{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent2);min-width:38px;text-align:right}

/* COLOR */
.cr{display:flex;align-items:center;gap:7px}
input[type=color]{width:34px;height:32px;border-radius:var(--rs);border:1px solid var(--border2);padding:2px;cursor:pointer;background:var(--bg3)}

/* SHAPE GRID */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.sb{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);cursor:pointer;transition:.15s}
.sb:hover{border-color:var(--border2);background:var(--bg4)}
.sb.on{border-color:var(--accent);background:var(--accent-bg)}
.sb svg{width:30px;height:30px}

/* ECL */
.eg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.eb{padding:7px 2px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);cursor:pointer;transition:.15s;text-align:center;font-size:11px;font-weight:700;color:var(--text2)}
.eb:hover{border-color:var(--border2)}
.eb.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent2)}
.eb-sub{font-size:9px;font-weight:400;color:var(--text3);margin-top:1px}

/* TOGGLE */
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tog{position:relative;width:38px;height:20px;cursor:pointer;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.ts{position:absolute;inset:0;background:var(--bg4);border-radius:20px;border:1px solid var(--border2);transition:.2s}
.ts:before{content:'';position:absolute;left:3px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--text3);transition:.2s}
input:checked+.ts{background:var(--accent)}
input:checked+.ts:before{transform:translateX(18px);background:white}

/* UPLOAD */
.upload{border:1.5px dashed var(--border2);border-radius:var(--r);padding:1rem;text-align:center;cursor:pointer;transition:.2s;background:var(--bg3)}
.upload:hover{border-color:var(--accent);background:var(--accent-bg)}
.upload input{display:none}
.upload p{font-size:11px;color:var(--text2);margin-top:4px}

/* PRESETS */
.presets{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.ps{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid var(--border2);transition:.15s}
.ps:hover{transform:scale(1.15);border-color:var(--accent)}

/* GEN BTN */
.gen-btn{width:100%;padding:12px;border-radius:var(--r);border:none;background:var(--accent);color:white;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.gen-btn:hover{background:var(--accent2)}
.gen-btn svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2}

/* RIGHT PANEL */
.right{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:1.25rem;position:sticky;top:61px;height:calc(100vh - 61px);overflow:hidden}
.qr-card{position:relative;background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:1.5rem;box-shadow:0 0 60px rgba(124,106,247,.08);display:flex;align-items:center;justify-content:center}
#qr-out{display:flex;align-items:center;justify-content:center;min-width:200px;min-height:200px}
#qr-out canvas{display:block;max-width:min(320px,calc(35vw - 60px));max-height:min(320px,calc(100vh - 260px));width:auto!important;height:auto!important}
.qr-badge{position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);padding:3px 14px;border-radius:20px;font-size:10px;font-weight:700;color:var(--text3);white-space:nowrap;letter-spacing:.06em}
.btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.btn{padding:9px 16px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.btn:hover{background:var(--bg4)}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-align:center}

/* GRAD PREVIEW */
.gp{height:24px;border-radius:var(--rs);margin-top:8px;border:1px solid var(--border)}

/* hidden section */
.hidden{display:none}
</style>
</head>
<body>

<header class="hdr">
  <a class="logo" href="#">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM17 14h4v4h-4zM14 17h3v3h-3zM14 14h3v3h-3z"/></svg></div>
    <span class="logo-txt">QR<span>Gen</span></span>
  </a>
  <div class="hdr-r">
    <div class="counter"><b id="hit-count">—</b> QR codes generated</div>
    <button class="icon-btn" id="theme-btn" title="Toggle theme">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <a class="gh-btn" href="https://github.com/shri-life/qrgen" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 013-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
  </div>
</header>

<div class="wrap">
<!-- ═══ LEFT 30% ═══ -->
<div class="left">

  <!-- CONTENT TYPE -->
  <div class="sec">
    <div class="sec-lbl">Content Type</div>
    <div class="type-grid">
      <div class="tb on" data-t="url"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>URL</div>
      <div class="tb" data-t="text"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>TEXT</div>
      <div class="tb" data-t="wifi"><svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0"/><circle cx="12" cy="20" r=".5" fill="currentColor"/></svg>WI-FI</div>
      <div class="tb" data-t="vcard"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>VCARD</div>
      <div class="tb" data-t="email"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>EMAIL</div>
      <div class="tb" data-t="sms"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>SMS</div>
      <div class="tb" data-t="phone"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>PHONE</div>
      <div class="tb" data-t="location"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>MAPS</div>
      <div class="tb" data-t="whatsapp"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>WA</div>
      <div class="tb" data-t="event"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>EVENT</div>
    </div>

    <div class="panel show" id="p-url"><div class="f"><label>Website URL</label><input type="url" id="url-v" value="https://shri.life" placeholder="https://..."></div></div>
    <div class="panel" id="p-text"><div class="f"><label>Text</label><textarea id="text-v" placeholder="Any text..."></textarea></div></div>
    <div class="panel" id="p-wifi">
      <div class="r2"><div class="f"><label>Network (SSID)</label><input type="text" id="wifi-s" placeholder="MyNetwork"></div><div class="f"><label>Password</label><input type="text" id="wifi-p" placeholder="password"></div></div>
      <div class="f"><label>Security</label><select id="wifi-t"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="">None</option></select></div>
    </div>
    <div class="panel" id="p-vcard">
      <div class="r2"><div class="f"><label>First Name</label><input type="text" id="vc-fn" placeholder="Ali"></div><div class="f"><label>Last Name</label><input type="text" id="vc-ln" placeholder="Hassan"></div></div>
      <div class="r2"><div class="f"><label>Phone</label><input type="tel" id="vc-ph" placeholder="+968..."></div><div class="f"><label>Email</label><input type="email" id="vc-em" placeholder="ali@..."></div></div>
      <div class="r2"><div class="f"><label>Company</label><input type="text" id="vc-or" placeholder="Company"></div><div class="f"><label>Title</label><input type="text" id="vc-ti" placeholder="CEO"></div></div>
      <div class="f"><label>Website</label><input type="url" id="vc-ur" placeholder="https://..."></div>
    </div>
    <div class="panel" id="p-email">
      <div class="f"><label>To</label><input type="email" id="em-to" placeholder="someone@example.com"></div>
      <div class="f"><label>Subject</label><input type="text" id="em-su" placeholder="Hello!"></div>
      <div class="f"><label>Body</label><textarea id="em-bo" placeholder="Message..."></textarea></div>
    </div>
    <div class="panel" id="p-sms">
      <div class="f"><label>Phone</label><input type="tel" id="sms-p" placeholder="+968..."></div>
      <div class="f"><label>Message</label><textarea id="sms-m" placeholder="Message..."></textarea></div>
    </div>
    <div class="panel" id="p-phone"><div class="f"><label>Phone Number</label><input type="tel" id="ph-v" placeholder="+968..."></div></div>
    <div class="panel" id="p-location">
      <div class="r2"><div class="f"><label>Latitude</label><input type="text" id="loc-la" placeholder="23.5880"></div><div class="f"><label>Longitude</label><input type="text" id="loc-lo" placeholder="58.3829"></div></div>
      <div class="f"><label>Label</label><input type="text" id="loc-lb" placeholder="Muscat, Oman"></div>
    </div>
    <div class="panel" id="p-whatsapp">
      <div class="f"><label>Number (with country code)</label><input type="tel" id="wa-p" placeholder="+968..."></div>
      <div class="f"><label>Pre-filled message</label><textarea id="wa-m" placeholder="Hello!"></textarea></div>
    </div>
    <div class="panel" id="p-event">
      <div class="f"><label>Event Name</label><input type="text" id="ev-n" placeholder="My Event"></div>
      <div class="r2"><div class="f"><label>Start (YYYYMMDDTHHmmss)</label><input type="text" id="ev-s" placeholder="20260601T090000"></div><div class="f"><label>End</label><input type="text" id="ev-e" placeholder="20260601T170000"></div></div>
      <div class="f"><label>Location</label><input type="text" id="ev-l" placeholder="Muscat, Oman"></div>
    </div>
  </div>

  <!-- COLORS -->
  <div class="sec">
    <div class="sec-lbl">Colors</div>
    <div class="r2">
      <div class="f"><label>Foreground</label><div class="cr"><input type="color" id="fg-c" value="#000000"><input type="text" id="fg-h" value="#000000"></div></div>
      <div class="f"><label>Background</label><div class="cr"><input type="color" id="bg-c" value="#ffffff"><input type="text" id="bg-h" value="#ffffff"></div></div>
    </div>
    <div class="presets">
      <div class="ps" style="background:#000" data-fg="#000000" data-bg="#ffffff" title="Classic"></div>
      <div class="ps" style="background:#1e3a8a" data-fg="#1e3a8a" data-bg="#eff6ff" title="Navy"></div>
      <div class="ps" style="background:#065f46" data-fg="#065f46" data-bg="#ecfdf5" title="Forest"></div>
      <div class="ps" style="background:#7c2d12" data-fg="#7c2d12" data-bg="#fff7ed" title="Rust"></div>
      <div class="ps" style="background:#4c1d95" data-fg="#4c1d95" data-bg="#f5f3ff" title="Purple"></div>
      <div class="ps" style="background:#831843" data-fg="#831843" data-bg="#fdf2f8" title="Rose"></div>
      <div class="ps" style="background:#1e293b" data-fg="#1e293b" data-bg="#f8fafc" title="Slate"></div>
      <div class="ps" style="background:#ffffff;border-color:#ccc" data-fg="#ffffff" data-bg="#000000" title="Inverted"></div>
    </div>
    <div class="tog-row" style="margin-top:10px">
      <label style="margin:0;font-size:11px;font-weight:600;color:var(--text2)">Gradient foreground</label>
      <label class="tog"><input type="checkbox" id="grad-on"><span class="ts"></span></label>
    </div>
    <div id="grad-sec" class="hidden">
      <div class="r2">
        <div class="f"><label>Start color</label><div class="cr"><input type="color" id="gs-c" value="#7c6af7"><input type="text" id="gs-h" value="#7c6af7"></div></div>
        <div class="f"><label>End color</label><div class="cr"><input type="color" id="ge-c" value="#ec4899"><input type="text" id="ge-h" value="#ec4899"></div></div>
      </div>
      <div class="f"><label>Direction</label><select id="grad-dir"><option value="h">Horizontal</option><option value="v">Vertical</option><option value="d">Diagonal</option><option value="r">Radial</option></select></div>
      <div class="gp" id="grad-prev"></div>
    </div>
  </div>

  <!-- MODULE SHAPE -->
  <div class="sec">
    <div class="sec-lbl">Module Shape</div>
    <div class="sg" id="mod-shapes">
      <div class="sb on" data-s="square"><svg viewBox="0 0 40 40"><rect x="8" y="8" width="24" height="24" fill="var(--text)"/></svg></div>
      <div class="sb" data-s="rounded"><svg viewBox="0 0 40 40"><rect x="8" y="8" width="24" height="24" rx="7" fill="var(--text)"/></svg></div>
      <div class="sb" data-s="dot"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="13" fill="var(--text)"/></svg></div>
      <div class="sb" data-s="diamond"><svg viewBox="0 0 40 40"><polygon points="20,6 34,20 20,34 6,20" fill="var(--text)"/></svg></div>

<script>
// ── STATE ──────────────────────────────────────────────

let timer = null;

// ── TYPE TABS ──────────────────────────────────────────
document.querySelectorAll('.tb').forEach(b => b.addEventListener('click', () => {

// ── SHAPE / EYE / ECL ─────────────────────────────────
document.querySelectorAll('#mod-shapes .sb').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#mod-shapes .sb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); S.modShape=b.dataset.s; go();
}));
document.querySelectorAll('#eye-shapes .sb').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#eye-shapes .sb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); S.eyeShape=b.dataset.e; go();

// ── RANGES ────────────────────────────────────────────
document.getElementById('qr-sz').addEventListener('input', function(){ S.size=+this.value; document.getElementById('qr-sz-v').textContent=this.value+'px'; go(); });
document.getElementById('qr-mg').addEventListener('input', function(){ S.margin=+this.value; document.getElementById('qr-mg-v').textContent=this.value; go(); });
document.getElementById('logo-sz').addEventListener('input', function(){ S.logoSz=+this.value; document.getElementById('logo-sz-v').textContent=this.value+'%'; go(); });
document.getElementById('logo-pad').addEventListener('change', function(){ S.logoPad=this.checked; go(); });

// ── COLOR SYNC ────────────────────────────────────────
function bindColor(pickerId, hexId, key) {
  const picker = document.getElementById(pickerId);
  const hex = document.getElementById(hexId);
  if(!picker||!hex) return;
  picker.addEventListener('input', ()=>{ hex.value=picker.value; S[key]=picker.value; updateGradPrev(); go(); });
  hex.addEventListener('change', ()=>{ if(/^#[0-9a-fA-F]{6}$/.test(hex.value)){ picker.value=hex.value; S[key]=hex.value; updateGradPrev(); go(); }});
}
bindColor('fg-c','fg-h','fg'); bindColor('bg-c','bg-h','bg');
bindColor('gs-c','gs-h','gs'); bindColor('ge-c','ge-h','ge');
bindColor('eo-c','eo-h','eo'); bindColor('ei-c','ei-h','ei');

// ── PRESETS ───────────────────────────────────────────
document.querySelectorAll('.ps').forEach(p => p.addEventListener('click', () => {
  S.fg=p.dataset.fg; S.bg=p.dataset.bg;

  document.getElementById('bg-c').value=S.bg; document.getElementById('bg-h').value=S.bg;
  go();
}));

// ── GRADIENT ──────────────────────────────────────────
document.getElementById('grad-on').addEventListener('change', function(){ S.grad=this.checked; document.getElementById('grad-sec').classList.toggle('hidden',!this.checked); go(); });

function updateGradPrev(){

  const dirs={h:'to right',v:'to bottom',d:'to bottom right'};
  el.style.background = S.gdir==='r'
    ? `radial-gradient(circle, ${S.gs}, ${S.ge})`
    : `linear-gradient(${dirs[S.gdir]||'to right'}, ${S.gs}, ${S.ge})`;
}
updateGradPrev();

// ── EYE COLOR ─────────────────────────────────────────
document.getElementById('eye-col-on').addEventListener('change', function(){ S.eyeCol=this.checked; document.getElementById('eye-col-sec').classList.toggle('hidden',!this.checked); go(); });

// ── LOGO ──────────────────────────────────────────────
document.getElementById('upload-area').addEventListener('click', ()=>document.getElementById('logo-file').click());
document.getElementById('logo-file').addEventListener('change', function(){
  const file=this.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{ S.logo=ev.target.result; document.getElementById('logo-prev').src=S.logo; document.getElementById('logo-prev').style.display='block'; document.getElementById('logo-ctrls').classList.remove('hidden'); go(); };
  r.readAsDataURL(file);
});
document.getElementById('rm-logo').addEventListener('click', ()=>{ S.logo=null; document.getElementById('logo-prev').style.display='none'; document.getElementById('logo-ctrls').classList.add('hidden'); document.getElementById('logo-file').value=''; go(); });

// ── INPUT LISTENERS ───────────────────────────────────
['url-v','text-v','wifi-s','wifi-p','wifi-t','vc-fn','vc-ln','vc-ph','vc-em','vc-or','vc-ti','vc-ur',
 'em-to','em-su','em-bo','sms-p','sms-m','ph-v','loc-la','loc-lo','loc-lb','wa-p','wa-m',
 'ev-n','ev-s','ev-e','ev-l'].forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('input', go); });

document.getElementById('gen-btn').addEventListener('click', ()=>render(true));

// ── CONTENT BUILDER ───────────────────────────────────
function v(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function enc(s){ try{return encodeURIComponent(s)}catch{return s} }
function content() {
  switch(S.type){
    case 'url':   return v('url-v')||'https://shri.life';
    case 'text':  return v('text-v')||'Hello!';
    case 'wifi':  return `WIFI:T:${v('wifi-t')};S:${v('wifi-s')};P:${v('wifi-p')};;`;
    case 'vcard': return `BEGIN:VCARD\nVERSION:3.0\nN:${v('vc-ln')};${v('vc-fn')}\nFN:${v('vc-fn')} ${v('vc-ln')}\nTEL:${v('vc-ph')}\nEMAIL:${v('vc-em')}\nORG:${v('vc-or')}\nTITLE:${v('vc-ti')}\nURL:${v('vc-ur')}\nEND:VCARD`;
    case 'email': return `mailto:${v('em-to')}?subject=${enc(v('em-su'))}&body=${enc(v('em-bo'))}`;
    case 'sms':   return `smsto:${v('sms-p')}:${v('sms-m')}`;
    case 'phone': return `tel:${v('ph-v')}`;
    case 'location': return `geo:${v('loc-la')},${v('loc-lo')}?q=${enc(v('loc-lb'))}`;
    case 'whatsapp': return `https://wa.me/${v('wa-p').replace(/\D/g,'')}${v('wa-m')?'?text='+enc(v('wa-m')):''}`;
    case 'event': return `BEGIN:VEVENT\nSUMMARY:${v('ev-n')}\nDTSTART:${v('ev-s')}\nDTEND:${v('ev-e')}\nLOCATION:${v('ev-l')}\nEND:VEVENT`;
    default: return 'https://shri.life';
  }
}

// ── SCHEDULE ──────────────────────────────────────────
function go(){ clearTimeout(timer); timer=setTimeout(()=>render(false),400); }

// ── RENDER ────────────────────────────────────────────
function render(counted) {
  const out = document.getElementById('qr-out');
  const txt = content();
  const sz = Math.min(S.size, 700);

  // Use hidden div to get raw QR canvas from qrcode.js
  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden';
  document.body.appendChild(tmp);

  try {
    new QRCode(tmp, {
      text: txt,
      width: 512, height: 512,
      colorDark:'#000000', colorLight:'#ffffff',
      correctLevel: QRCode.CorrectLevel[S.ecl] || QRCode.CorrectLevel.M
    });
  } catch(e) {
    document.body.removeChild(tmp);
    out.innerHTML = `<p style="color:var(--text3);font-size:12px;padding:1rem">Error: ${e.message}</p>`;
    return;
  }

  setTimeout(() => {
    const src = tmp.querySelector('canvas');
    if(!src){ document.body.removeChild(tmp); return; }

    const matrix = readMatrix(src);
    document.body.removeChild(tmp);

    const canvas = paintQR(matrix, sz, txt);
    out.innerHTML = '';
    out.appendChild(canvas);

    document.getElementById('qr-meta').textContent =
      `${sz}×${sz}px · ${new TextEncoder().encode(txt).length}B · ECL ${S.ecl} · ${S.modShape}`;

    if(counted) bumpCount();
  }, 150);
}

// ── READ MATRIX from qrcode.js canvas ─────────────────
function readMatrix(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const data = ctx.getImageData(0,0,W,W).data;

  // qrcode.js adds a quiet zone. Find first dark pixel column-wise from left
  let quietPx = 0;
  for(let x = 0; x < W; x++){
    const idx = (Math.floor(W*0.5) * W + x) * 4; // scan middle row
    if(data[idx] < 128){ quietPx = x; break; }
  }

  // From first dark pixel, measure first dark run = 7 modules (finder bar)
  let run = 0;
  for(let x = quietPx; x < W; x++){
    const idx = (Math.floor(W*0.5) * W + x) * 4;
    if(data[idx] < 128) run++; else break;
  }
  // modPx = pixels per module
  let modPx = run > 0 ? run / 7 : W / 37;

  // Active area = W - 2*quietPx
  const activePx = W - 2 * quietPx;
  const N = Math.round(activePx / modPx);

  const mat = [];
  for(let r = 0; r < N; r++){
    mat[r] = [];
    for(let c = 0; c < N; c++){
      // Sample center of each module within the active area
      const sx = Math.min(Math.round(quietPx + (c + 0.5) * modPx), W-1);
      const sy = Math.min(Math.round(quietPx + (r + 0.5) * modPx), W-1);
      mat[r][c] = data[(sy * W + sx) * 4] < 128;
    }
  }
  return mat;
}

// ── PAINT QR ──────────────────────────────────────────
function paintQR(mat, sz, txt) {
  const N = mat.length;
  const canvas = document.createElement('canvas');
  canvas.width = sz; canvas.height = sz;
  const ctx = canvas.getContext('2d');
  const mg = S.margin * (sz / N);
  const mod = (sz - mg * 2) / N;

  // Fill background
  ctx.fillStyle = S.bg;
  ctx.fillRect(0, 0, sz, sz);

  // Mark finder cells (rows 0-8, cols 0-8 for TL; 0-8, N-8 to N for TR; N-8 to N, 0-8 for BL)
  const skip = new Set();
  const markFinder = (r0, c0) => {
    // 7x7 finder + 1 module separator = 8 wide
    for(let r = r0-1; r <= r0+7; r++)
      for(let c = c0-1; c <= c0+7; c++)
        if(r>=0&&c>=0&&r<N&&c<N) skip.add(r+','+c);
  };
  markFinder(0,0); markFinder(0,N-7); markFinder(N-7,0);

  // Foreground fill style
  let fg;
  if(S.grad){
    let g;
    if(S.gdir==='r') g=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
    else if(S.gdir==='v') g=ctx.createLinearGradient(0,0,0,sz);
    else if(S.gdir==='d') g=ctx.createLinearGradient(0,0,sz,sz);
    else g=ctx.createLinearGradient(0,0,sz,0);
    g.addColorStop(0,S.gs); g.addColorStop(1,S.ge);
    fg = g;
  } else {
    fg = S.fg;
  }

  // Draw data modules
  ctx.fillStyle = fg;
  for(let r = 0; r < N; r++){
    for(let c = 0; c < N; c++){
      if(!mat[r][c]) continue;
      if(skip.has(r+','+c)) continue;
      const x = mg + c * mod, y = mg + r * mod;
      drawMod(ctx, x, y, mod, S.modShape);
    }
  }

  // Draw 3 finder (eye) patterns
  const eyeOuter = S.eyeCol ? S.eo : (S.grad ? S.gs : S.fg);
  const eyeInner = S.eyeCol ? S.ei : (S.grad ? S.ge : S.fg);
  drawFinder(ctx, mg + 0*mod,     mg + 0*mod,     mod, eyeOuter, eyeInner);  // TL
  drawFinder(ctx, mg + (N-7)*mod, mg + 0*mod,     mod, eyeOuter, eyeInner);  // TR
  drawFinder(ctx, mg + 0*mod,     mg + (N-7)*mod, mod, eyeOuter, eyeInner);  // BL

  // Logo overlay
  if(S.logo){ overlayLogo(ctx, sz); }

  return canvas;
}

// ── DRAW MODULE ───────────────────────────────────────
function drawMod(ctx, x, y, mod, shape) {
  const pad = mod * 0.1, s = mod - pad*2;
  const cx = x+mod/2, cy = y+mod/2, r = s/2;
  const px = x+pad, py = y+pad;
  switch(shape){
    case 'square':   ctx.fillRect(px,py,s,s); break;
    case 'rounded':  rrect(ctx,px,py,s,s,r*0.45); break;
    case 'dot':      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); break;
    case 'diamond':  ctx.beginPath(); ctx.moveTo(cx,py); ctx.lineTo(px+s,cy); ctx.lineTo(cx,py+s); ctx.lineTo(px,cy); ctx.closePath(); ctx.fill(); break;
    case 'star':     drawStar(ctx,cx,cy,r,r*0.4,5); break;
    case 'cross':    const t=s*0.38; ctx.fillRect(cx-t/2,py,t,s); ctx.fillRect(px,cy-t/2,s,t); break;
    case 'triangle': ctx.beginPath(); ctx.moveTo(cx,py); ctx.lineTo(px+s,py+s); ctx.lineTo(px,py+s); ctx.closePath(); ctx.fill(); break;
    case 'heart':    drawHeart(ctx,cx,cy,r); break;
  }
}

function drawStar(ctx,cx,cy,ro,ri,pts){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const a=(i*Math.PI/pts)-Math.PI/2, rad=i%2===0?ro:ri;
    i===0?ctx.moveTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a)):ctx.lineTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

function drawHeart(ctx,cx,cy,r){
  ctx.beginPath();
  ctx.moveTo(cx,cy+r*0.8);
  ctx.bezierCurveTo(cx-r*1.8,cy-r*0.2,cx-r*1.8,cy-r*1.0,cx,cy-r*0.2);
  ctx.bezierCurveTo(cx+r*1.8,cy-r*1.0,cx+r*1.8,cy-r*0.2,cx,cy+r*0.8);
  ctx.fill();
}

// ── DRAW FINDER (EYE) ─────────────────────────────────
function drawFinder(ctx, x, y, mod, outerC, innerC) {
  // x,y = top-left of finder pattern (7×7 modules)
  const S7 = 7*mod, S3 = 3*mod;
  const ix = x+2*mod, iy = y+2*mod;
  const es = S.eyeShape;

  // Wipe area clean
  ctx.fillStyle = S.bg;
  ctx.fillRect(x-mod, y-mod, S7+mod*2, S7+mod*2);

  // --- OUTER FRAME ---
  ctx.fillStyle = outerC;
  switch(es){
    case 'ro': case 'rb':
      rrect(ctx,x,y,S7,S7,mod*1.2);
      ctx.fillStyle=S.bg; rrect(ctx,x+mod,y+mod,S7-mod*2,S7-mod*2,mod*0.6);
      break;
    case 'ca':
      ctx.beginPath(); ctx.arc(x+S7/2,y+S7/2,S7/2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=S.bg; ctx.beginPath(); ctx.arc(x+S7/2,y+S7/2,S7/2-mod,0,Math.PI*2); ctx.fill();
      break;
    case 'lf':
      ctx.beginPath(); ctx.moveTo(x,y); ctx.quadraticCurveTo(x+S7,y,x+S7,y+S7); ctx.quadraticCurveTo(x,y+S7,x,y); ctx.fill();
      ctx.fillStyle=S.bg; ctx.beginPath(); ctx.moveTo(x+mod,y+mod); ctx.quadraticCurveTo(x+S7-mod,y+mod,x+S7-mod,y+S7-mod); ctx.quadraticCurveTo(x+mod,y+S7-mod,x+mod,y+mod); ctx.fill();
      break;
    default: // sq, di, st, dm
      ctx.fillRect(x,y,S7,S7);
      ctx.fillStyle=S.bg; ctx.fillRect(x+mod,y+mod,S7-mod*2,S7-mod*2);
  }

  // --- INNER DOT ---
  ctx.fillStyle = innerC;
  switch(es){
    case 'di': case 'ca':
      ctx.beginPath(); ctx.arc(ix+S3/2,iy+S3/2,S3/2,0,Math.PI*2); ctx.fill(); break;
    case 'rb':
      rrect(ctx,ix,iy,S3,S3,S3*0.25); break;
    case 'st':
      drawStar(ctx,ix+S3/2,iy+S3/2,S3/2,S3*0.2,5); break;
    case 'dm':
      ctx.beginPath(); ctx.moveTo(ix+S3/2,iy); ctx.lineTo(ix+S3,iy+S3/2); ctx.lineTo(ix+S3/2,iy+S3); ctx.lineTo(ix,iy+S3/2); ctx.closePath(); ctx.fill(); break;
    case 'lf':
      ctx.beginPath(); ctx.moveTo(ix,iy); ctx.quadraticCurveTo(ix+S3,iy,ix+S3,iy+S3); ctx.quadraticCurveTo(ix,iy+S3,ix,iy); ctx.fill(); break;
    default:
      ctx.fillRect(ix,iy,S3,S3);
  }
}

// ── HELPERS ───────────────────────────────────────────
function rrect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath(); ctx.fill();
}

function overlayLogo(ctx,sz){
  const img=new Image(); img.onload=()=>{
    const ls=sz*(S.logoSz/100), lx=(sz-ls)/2, ly=(sz-ls)/2;
    if(S.logoPad){ ctx.fillStyle='#ffffff'; rrect(ctx,lx-ls*0.12,ly-ls*0.12,ls*1.24,ls*1.24,ls*0.1); }
    ctx.drawImage(img,lx,ly,ls,ls);
  }; img.src=S.logo;
}

// ── DOWNLOAD / ACTIONS ────────────────────────────────
function getCanvas(){ return document.querySelector('#qr-out canvas'); }

function dlQR(fmt){
  const c=getCanvas(); if(!c){alert('Generate a QR first');return;}
  const a=document.createElement('a');
  if(fmt==='png'){ a.href=c.toDataURL('image/png'); a.download='qrcode.png'; a.click(); }
  else if(fmt==='jpg'){
    const t=document.createElement('canvas'); t.width=c.width; t.height=c.height;
    const tc=t.getContext('2d'); tc.fillStyle='#fff'; tc.fillRect(0,0,t.width,t.height); tc.drawImage(c,0,0);
    a.href=t.toDataURL('image/jpeg',0.95); a.download='qrcode.jpg'; a.click();
  } else if(fmt==='svg'){
    const s=c.width;
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><image href="${c.toDataURL()}" width="${s}" height="${s}"/></svg>`;
    a.href=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'})); a.download='qrcode.svg'; a.click();
  }
}

function copyQR(){
  const c=getCanvas(); if(!c) return;
  c.toBlob(b=>{
    try{ navigator.clipboard.write([new ClipboardItem({'image/png':b})]).then(()=>{ const btn=document.querySelectorAll('.btn')[3]; if(btn){const o=btn.innerHTML;btn.textContent='Copied!';setTimeout(()=>btn.innerHTML=o,1500);} }); }
    catch(e){ alert('Copy not supported — use Download instead'); }
  });
}

function printQR(){
  const c=getCanvas(); if(!c) return;
  const w=window.open('');
  w.document.write(`<html><body style="margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${c.toDataURL()}" style="max-width:80vmin"></body></html>`);
  w.document.close(); w.focus(); w.print(); w.close();
}

// ── INIT ──────────────────────────────────────────────
render(false);
</script>

name = "qrgen-counter"
main = "counter-worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

# After running: wrangler kv:namespace create QRGEN_KV
# paste the returned id below
[[kv_namespaces]]
binding = "QRGEN_KV"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

